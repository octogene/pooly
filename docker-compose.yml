networks:
  monitor-net:
    driver: bridge
  common-net:

volumes:
  prometheus_data: {}
  grafana_data: {}
  grafana_provisioning: {}
  postgres_data: {}
  tempo_data: {}
  valkey_data: {}

services:
  pooly-app:
    image: pooly:latest
    environment:
      - DB_DRIVER=org.postgresql.Driver
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pooly_db
      - DB_PASSWORD=pooly_password
      - DB_USERNAME=pooly_user
      - CACHE_TYPE=VALKEY
      - CACHE_HOST=cache
      - CACHE_PORT=6379
      - CACHE_DEFAULT_TTL=PT2M
      - OTEL_JAVAAGENT_DEBUG=true
      - OTEL_JAVAAGENT_LOGGING=application
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=pooly,service.name=api
      - PYROSCOPE_APPLICATION_NAME=api
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_FORMAT=jfr
      - PYROSCOPE_PROFILING_INTERVAL=10ms
      - PYROSCOPE_PROFILER_EVENT=itimer
      - PYROSCOPE_PROFILER_LOCK=10ms
      - PYROSCOPE_PROFILER_ALLOC=512k
      - JAVA_TOOL_OPTIONS=
          -javaagent:/extras/opentelemetry-javaagent.jar
          -javaagent:/extras/pyroscope.jar
          -XX:+PrintFlagsFinal
          -XX:+UseShenandoahGC
          -XX:ShenandoahGCMode=generational
          -XX:+UseCompactObjectHeaders
          -XX:StartFlightRecording:jdk.SafepointLatency#enabled=true,filename=pooly.jfr
    ports:
      - "8080:8080"
    networks:
      - common-net
    depends_on:
      - otel-collector
  pooly-worker:
    image: pooly-worker:latest
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=pooly_db
      - DB_DRIVER=org.postgresql.Driver
      - DB_PASSWORD=pooly_password
      - DB_USERNAME=pooly_user
      - CHECK_INTERVAL=10m
      - OTEL_JAVAAGENT_DEBUG=true
      - OTEL_JAVAAGENT_LOGGING=application
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_RESOURCE_ATTRIBUTES=service.namespace=pooly,service.name=worker
      - PYROSCOPE_APPLICATION_NAME=worker
      - PYROSCOPE_SERVER_ADDRESS=http://pyroscope:4040
      - PYROSCOPE_FORMAT=jfr
      - PYROSCOPE_PROFILING_INTERVAL=10ms
      - PYROSCOPE_PROFILER_EVENT=itimer
      - PYROSCOPE_PROFILER_LOCK=10ms
      - PYROSCOPE_PROFILER_ALLOC=512k
      - JAVA_TOOL_OPTIONS=
        -javaagent:/extras/opentelemetry-javaagent.jar
        -javaagent:/extras/pyroscope.jar
        -XX:+PrintFlagsFinal
        -XX:+UseShenandoahGC
        -XX:ShenandoahGCMode=generational
        -XX:+UseCompactObjectHeaders
        -XX:StartFlightRecording:jdk.SafepointLatency#enabled=true,filename=pooly-worker.jfr
    networks:
      - common-net
  db:
    image: postgres:18
    container_name: postgres_db
    environment:
      POSTGRES_DB: pooly_db
      POSTGRES_USER: pooly_user
      POSTGRES_PASSWORD: pooly_password
    volumes:
      - postgres_data:/var/lib/postgresql/docker
    ports:
      - "5432:5432"
    networks:
      - common-net
  cache:
    image: valkey/valkey:9.1-alpine
    command: valkey-server --port 6379 --loglevel debug
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    networks:
      - common-net
  cache-exporter:
    image: oliver006/redis_exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=cache:6379
      - REDIS_EXPORTER_LOG_LEVEL=debug
      - REDIS_EXPORTER_NAMESPACE=pooly
    networks:
      - common-net
  autoinstrumenter:
    image: docker.io/otel/ebpf-instrument:main
    pid: 'host'
    privileged: true
    environment:
      OTEL_EBPF_TRACE_PRINTER: text
      OTEL_EBPF_OPEN_PORT: 8080
    networks:
      - common-net
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    command: ["--config=/etc/otel-agent-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889" # prometheus metrics
      - "13133" # health check
      - "1777" # pprof
      - "55679" # zpages
    networks:
      - monitor-net
      - common-net
    volumes:
      - "./config/awscollector/otel-config.yaml:/etc/otel-agent-config.yaml:z"
    depends_on:
      - prometheus
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    volumes:
      - ./config/prometheus:/etc/prometheus:z
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    ports:
      - "9090:9090"
    networks:
      - monitor-net
      - common-net
    labels:
      org.label-schema.group: "monitoring"
  tempo:
    image: grafana/tempo:2.10.4
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - "./config/tempo/tempo.yaml:/etc/tempo.yaml:z"
      - tempo_data:/var/tempo
    ports:
      - "3200" # tempo
      - "4319" # otlp grpc
      - "4320" # otlp http
    networks:
      - monitor-net
      - common-net
  grafana:
    image: grafana/grafana:12.4.3
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:z
    environment:
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - monitor-net
      - common-net
    labels:
      org.label-schema.group: "monitoring"
  loki:
    image: grafana/loki:3.7.1
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yaml:/etc/loki/loki-config.yaml:z
    networks:
      - monitor-net
      - common-net
    labels:
      org.label-schema.group: "monitoring"
  pyroscope:
    image: grafana/pyroscope:2.0.0
    ports:
      - "4040:4040"
    networks:
      - monitor-net
      - common-net
    labels:
      org.label-schema.group: "monitoring"
